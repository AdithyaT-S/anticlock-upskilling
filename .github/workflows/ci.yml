name: CI

on:
  pull_request:
    branches: [main, develop]
  workflow_call: # allow deploy.yml to reuse this workflow

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx eslint src --ext .ts,.tsx --max-warnings 0

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx vitest run --passWithNoTests --reporter=verbose
      - name: Coverage (enforced once tests exist)
        run: npx vitest run --passWithNoTests --coverage --coverage.thresholds.lines=80 --coverage.thresholds.functions=80
        continue-on-error: true # remove once first module tests are written

  build:
    name: Next.js build
    runs-on: ubuntu-latest
    env:
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-build-secret' }}
      NEXTAUTH_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/freshcrm
      DB_PROVIDER: local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx next build

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    env:
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-e2e-secret' }}
      NEXTAUTH_URL: http://localhost:3000
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DB_PROVIDER: ${{ vars.DB_PROVIDER || 'local' }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Build app
        run: npx next build
        env:
          NEXTAUTH_SECRET: ci-e2e-secret
          NEXTAUTH_URL: http://localhost:3000
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/freshcrm
          DB_PROVIDER: local
      - name: Start app
        run: npx next start &
        env:
          PORT: 3000
      - run: sleep 6
      - run: npx playwright test --reporter=html --pass-with-no-tests
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
